

services:

  postgres:
    image: postgres:16

    container_name: asset_management_db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asset_management

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asset_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:

    build: .

    container_name: asset_management_api

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8000:8000"

volumes:
  postgres_data: